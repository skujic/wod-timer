<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>WOD TIMER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #ff3c00;
    --accent2: #ffd100;
    --green: #00ff87;
    --text: #f0f0f0;
    --muted: #555;
    --danger: #ff1744;
    --rest: #2196f3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  @keyframes rotatePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.97); }
  }
  @keyframes rotateIcon {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(-20deg); }
    75% { transform: rotate(20deg); }
    100% { transform: rotate(0deg); }
  }
  @media (orientation: portrait) {
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9999;
    }
    body::after {
      content: "WOD TIMER";
      position: fixed;
      top: 38%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.5em;
      color: var(--muted);
      z-index: 10000;
    }
    #app { display: none; }
    #rotate-msg {
      display: flex !important;
    }
  }
  #finish-overlay.show ~ #rotate-msg,
  body.finish-open #rotate-msg { display: none !important; }
  #rotate-msg {
    display: none;
    position: fixed; inset: 0;
    z-index: 10001;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--bg);
    pointer-events: none;
  }
  #rotate-icon {
    font-size: 3.5rem;
    animation: rotateIcon 2s ease-in-out infinite;
    color: var(--accent);
  }
  #rotate-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    animation: rotatePulse 2s ease-in-out infinite;
  }
  #rotate-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--muted);
  }
  #app {
    display: grid;
    grid-template-columns: 190px 1fr 175px;
    grid-template-rows: 100vh;
    height: 100vh;
    width: 100vw;
  }
  #mode-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .panel-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .mode-btn {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    cursor: pointer;
    border: none;
    background: none;
    color: #777;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem;
    letter-spacing: 0.14em;
    text-align: left;
    width: 100%;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .mode-btn:active { background: var(--surface2); }
  .mode-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-left-color: var(--accent);
  }
  .mode-cat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    padding: 10px 16px 3px;
  }
  .divider { height: 1px; background: var(--border); margin: 4px 0; }
  #main-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px 14px;
    padding-bottom: max(14px, env(safe-area-inset-bottom, 14px));
    position: relative;
    overflow: hidden;
  }
  #main-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,60,0,0.04) 0%, transparent 65%);
    pointer-events: none;
  }
  #mode-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-align: center;
  }
  #clock-display {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #phase-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--green);
    text-transform: uppercase;
    height: 14px;
    margin-bottom: 2px;
  }
  #main-time {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--text);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    transition: color 0.2s;
  }
  #time-mm, #time-ss {
    font-size: clamp(6rem, 26vw, 22rem);
    min-width: 0;
    text-align: center;
    flex: 1;
    line-height: 1;
  }
  #time-colon {
    font-size: clamp(4rem, 17vw, 14rem);
    line-height: 1;
    padding: 0 2px;
    opacity: 0.5;
    flex-shrink: 0;
    align-self: center;
    padding-bottom: 0.1em;
  }
  #main-time.warning #time-mm,
  #main-time.warning #time-ss,
  #main-time.warning #time-colon { color: var(--accent2); }
  #main-time.danger #time-mm,
  #main-time.danger #time-ss,
  #main-time.danger #time-colon  { color: var(--danger); animation: blink 0.5s infinite; }
  #main-time.rest #time-mm,
  #main-time.rest #time-ss,
  #main-time.rest #time-colon    { color: var(--rest); animation: blink 0.5s infinite; }
  @keyframes blink { 50% { opacity: 0.35; } }
  #round-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-top: 5px;
    min-height: 18px;
  }
  #info-row {
    display: flex;
    gap: 32px;
    align-items: center;
    justify-content: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    width: 100%;
    max-width: 360px;
  }
  .info-chip { text-align: center; }
  .info-chip-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    color: var(--accent2);
    display: block;
    line-height: 1;
  }
  .info-chip-lbl {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 1px;
  }
  #progress-wrap {
    width: 100%;
    position: relative;
    height: 36px;
    display: flex;
    align-items: center;
  }
  #progress-track {
    flex: 1;
    height: 22px;
    background: #111;
    border-radius: 50px;
    overflow: hidden;
    border: 2px solid #2a2a2a;
    position: relative;
  }
  #progress-track::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent calc(10% - 1px),
      rgba(0,0,0,0.5) calc(10% - 1px),
      rgba(0,0,0,0.5) 10%
    );
    z-index: 2;
    pointer-events: none;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff1a00, #ff5500, #ff9500, #ffd100);
    width: 0%;
    transition: width 0.1s linear;
    border-radius: 50px;
    position: relative;
    box-shadow: 0 0 20px rgba(255,120,0,0.9), 0 0 40px rgba(255,60,0,0.6), 0 0 60px rgba(255,60,0,0.3);
    animation: burnPulse 1.2s ease-in-out infinite;
  }
  @keyframes burnPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,100,0,0.5), 0 0 16px rgba(255,60,0,0.2); }
    50%       { box-shadow: 0 0 14px rgba(255,150,0,0.8), 0 0 28px rgba(255,60,0,0.4); }
  }
  #controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ctrl-btn {
    border: none;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.93); }
  #btn-start {
    background: var(--accent);
    color: #fff;
    font-size: 1.5rem;
    padding: 11px 34px;
    border-radius: 50px;
    min-width: 130px;
    box-shadow: 0 4px 22px rgba(255,60,0,0.4);
  }
  #btn-start:active { background: #ff5000; }
  #btn-start.paused { background: var(--green); color: #000; box-shadow: 0 4px 22px rgba(0,255,135,0.3); }
  #btn-stop {
    background: transparent;
    color: #777;
    font-size: 1.1rem;
    padding: 10px 20px;
    border-radius: 50px;
    border: 1.5px solid #333;
  }
  #btn-stop:active { border-color: var(--danger); color: var(--danger); }
  #btn-reset {
    background: transparent;
    color: #666;
    font-size: 1.1rem;
    padding: 10px 20px;
    border-radius: 50px;
    border: 1.5px solid #282828;
  }
  #btn-reset:active { color: var(--accent2); border-color: var(--accent2); }
  #settings-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 10px 8px;
    overflow-y: auto;
    gap: 7px;
  }
  .setting-group {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px;
    border: 1px solid var(--border);
  }
  .setting-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.22em;
    color: #aaa;
    margin-bottom: 7px;
    display: block;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .num-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    text-align: center;
    width: 44px;
    padding: 0;
    pointer-events: none;
  }
  .num-input:focus { outline: none; }
  .colon { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--muted); }
  .spin-btn {
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: #aaa;
    width: 26px; height: 26px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .spin-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .extra-setting { display: none; }
  .extra-setting.visible { display: block; }
  .submode-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .submode-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 4px 9px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .submode-pill.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,209,0,0.07); }
  #mode-panel, #settings-panel {
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1), padding 0.35s;
  }
  #app.focus {
    grid-template-columns: 0 1fr 0;
    transition: grid-template-columns 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #app.focus #mode-panel,
  #app.focus #settings-panel {
    width: 0; padding: 0; overflow: hidden; border: none;
  }
  #app.focus #time-mm,
  #app.focus #time-ss { font-size: clamp(10rem, 30vw, 28rem) !important; }
  #app.focus #time-colon { font-size: clamp(6rem, 20vw, 18rem) !important; }
  #app.focus #mode-title    { font-size: 1.3rem; letter-spacing: 0.45em; }
  #app.focus #round-display { font-size: 1.7rem; }
  #app.focus #phase-display { font-size: 1rem; }
  #app.focus #controls      { gap: 16px; }
  #app.focus #btn-start     { font-size: 2rem; padding: 14px 46px; }
  #app.focus #btn-stop,
  #app.focus #btn-reset     { font-size: 1.5rem; padding: 13px 28px; }
  #app.focus #progress-wrap  { height: 40px; }
  #app.focus #progress-track { height: 26px; }
  #focus-hint {
    display: none;
    position: absolute; top: 8px; right: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.55rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.1);
    pointer-events: none;
  }
  #app.focus #focus-hint { display: block; }
  #countdown-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 10;
    align-items: center; justify-content: center; flex-direction: column;
    transition: background 0.1s;
  }
  #countdown-overlay.flash {
    background: rgba(180,0,0,0.25);
  }
  #countdown-overlay.show { display: flex; }
  #countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(7rem, 28vw, 20rem);
    color: var(--accent);
    animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    line-height: 1;
  }
  @keyframes popIn {
    0%   { transform: scale(2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pop { 0%{transform:scale(1.6);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  #countdown-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem; letter-spacing: 0.3em; color: var(--muted);
  }
  /* Swipe to finish */
  /* FINISH button */
  #btn-finish {
    display: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.3em;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.6);
    padding: 14px 48px;
    border-radius: 50px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, color 0.15s;
    min-width: 200px;
  }
  #btn-finish:active { border-color: var(--danger); color: var(--danger); }
  @media (max-height: 500px) {
    #btn-finish { font-size: 1rem; padding: 10px 32px; min-width: 160px; }
  }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  /* Finish screen */
  #finish-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 20000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #finish-overlay.show { display: flex; }
  #fireworks-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #finish-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    text-align: center;
    padding: 20px;
  }
  #finish-check {
    width: clamp(110px, 24vw, 200px);
    height: clamp(110px, 24vw, 200px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 80px rgba(91,110,245,0.6), 0 0 120px rgba(91,110,245,0.25);
    animation: checkPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    flex-shrink: 0;
  }
  #finish-check svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 4px 24px rgba(91,110,245,0.5));
  }
  @keyframes checkPop {
    0%   { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  #finish-wod {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 4vw, 2.5rem);
    letter-spacing: 0.35em;
    color: var(--muted);
    animation: fadeUp 0.5s 0.3s ease both;
  }
  #finish-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 8rem);
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1;
    animation: fadeUp 0.5s 0.45s ease both;
  }
  #finish-quote {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1.2rem, 3.5vw, 1.8rem);
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    text-align: center;
    max-width: 420px;
    line-height: 1.4;
    animation: fadeUp 0.5s 0.6s ease both;
  }
  #finish-close {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 0.3em;
    background: transparent; border: 1px solid #333;
    color: var(--muted); padding: 10px 32px;
    border-radius: 50px; cursor: pointer;
    margin-top: 8px;
    animation: fadeUp 0.5s 0.75s ease both;
    -webkit-tap-highlight-color: transparent;
  }
  #finish-close:active { border-color: var(--accent); color: var(--accent); }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  /* Full-screen time picker */
  #picker-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  #picker-overlay.show { display: flex; }
  #picker-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.4em;
    color: var(--muted);
    margin-bottom: 24px;
  }
  #picker-body {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .picker-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .picker-colon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    color: var(--muted);
    margin: 0 8px;
    line-height: 1;
    align-self: center;
    padding-bottom: 12px;
  }
  .picker-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 18vw, 8rem);
    color: var(--text);
    line-height: 1;
    min-width: 2ch;
    text-align: center;
  }
  .picker-lbl {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
  }
  .picker-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    width: 64px; height: 64px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .picker-btn:active { background: var(--accent); border-color: var(--accent); }
  #picker-actions {
    display: flex;
    gap: 16px;
    margin-top: 36px;
  }
  .picker-action {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    padding: 12px 36px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #picker-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  #picker-confirm { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(255,60,0,0.4); }
  /* Mobile landscape fixes */
  /* Mobile: countdown centered above buttons */
  @media (max-height: 500px) {
    #countdown-overlay {
      inset: 0;
      bottom: 54px; /* don't cover buttons */
      justify-content: center;
      align-items: center;
      padding: 0;
    }
    #countdown-num {
      font-size: clamp(6rem, 44vh, 14rem);
      line-height: 1;
      margin: 0;
    }
    #countdown-label {
      font-size: 0.7rem;
      margin-top: 6px;
    }
  }
  @media (max-height: 500px) {
    #app {
      grid-template-columns: 130px 1fr 145px;
    }
    #main-panel {
      padding: 2px 12px 4px;
      padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
      justify-content: space-between;
    }
    /* Clock — vh-based so it fills available height on mobile landscape */
    #main-time { font-size: clamp(3.5rem, 18vh, 8rem) !important; }
    #mode-title { font-size: 0.55rem; letter-spacing: 0.3em; margin-bottom: 0; }

<script>
const BASE = 'https://cdn.jsdelivr.net/gh/skujic/wod-timer@main/audio/voiceovers/';
const CROWD_SRC = BASE + '11325622-crowd-clapping-and-cheering-effect-272056.mp3';

const COACH_CLIPS = [
  BASE + 'ElevenLabs_2026-03-07T21_41_06_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_41_28_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_41_48_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_42_17_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_42_38_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_43_02_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_43_18_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_43_39_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_43_59_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_44_21_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_44_48_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_45_05_Crossfit_gen_sp100_s50_sb75_v3.mp3'
];
const LAST_ROUND_CLIP = COACH_CLIPS[11];
const MOTIVATIONAL_CLIPS = COACH_CLIPS.slice(0, 11);
const state = {
  mode:'amrap', running:false, paused:false, intervalId:null,
  workTime:20*60, restTime:10, rounds:8, countdownSecs:5,
  currentRound:1, totalRounds:0, elapsed:0, phaseTime:0,
  phase:'idle',
  alerted:{last3:false},
  ladderType:'up', ladderReps:[], ladderIdx:0,
  totalDuration:0, log:[],
  crowdCheerPlayed: false,
  coachTriggers: []
};
// Audio
let AudioCtx;
function getACtx(){
  if(!AudioCtx){
    // 'ambient' category mixes with background audio (Spotify) instead of interrupting it
    const opts = { latencyHint: 'interactive' };
    try { opts.sampleRate = 44100; } catch(e){}
    AudioCtx = new(window.AudioContext||window.webkitAudioContext)(opts);
    // Set audio session to ambient so iOS mixes with Spotify
    if(window.AudioSession && AudioSession.type !== undefined){
      try { AudioSession.type = 'ambient'; } catch(e){}
    }
    // Webkit-specific: set playback category to ambient via audio element trick
    if(/iPhone|iPad|iPod/.test(navigator.userAgent)){
      const sil = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
      sil.setAttribute('playsinline','');
      sil.volume = 0;
      // Setting this on any Audio element before AudioContext creation sets session to ambient
      sil.play().catch(()=>{});
    }
  }
  return AudioCtx;
}
function beep(freq=880, dur=0.12, type='square', vol=0.3){
  try{
    const ctx = getACtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    // Force mono: merge to single channel then split back to stereo
    const merger  = ctx.createChannelMerger(2);
    const splitter = ctx.createChannelSplitter(1);
    osc.connect(gain);
    gain.connect(splitter);
    splitter.connect(merger, 0, 0);
    splitter.connect(merger, 0, 1);
    merger.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e){}
}
// Punchy countdown tick — two-tone click with a sharp attack
function beepCountdownTick(pitch=880){
  try{
    const ctx = getACtx();
    const now = ctx.currentTime;
    // Primary tone
    const osc1 = ctx.createOscillator();
    const g1   = ctx.createGain();
    const merger = ctx.createChannelMerger(2);
    const split  = ctx.createChannelSplitter(1);
    osc1.connect(g1); g1.connect(split);
    split.connect(merger,0,0); split.connect(merger,0,1);
    merger.connect(ctx.destination);
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(pitch, now);
    g1.gain.setValueAtTime(0.8, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc1.start(now); osc1.stop(now + 0.08);
    // Click layer
    const osc2 = ctx.createOscillator();
    const g2   = ctx.createGain();
    const m2   = ctx.createChannelMerger(2);
    const s2   = ctx.createChannelSplitter(1);
    osc2.connect(g2); g2.connect(s2);
    s2.connect(m2,0,0); s2.connect(m2,0,1);
    m2.connect(ctx.destination);
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(pitch * 1.5, now);
    g2.gain.setValueAtTime(0.3, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc2.start(now); osc2.stop(now + 0.04);
  } catch(e){}
}
function beepStart(){ beep(660,0.15,'sine',0.6); setTimeout(()=>beep(880,0.2,'sine',0.7),160); }
function beepEnd(){   beep(330,0.3,'sawtooth',0.5); setTimeout(()=>beep(220,0.4,'sawtooth',0.6),300); }
function beepAlert(){ beep(440,0.08,'sine',0.5); setTimeout(()=>beep(440,0.08,'sine',0.5),120); }
function beepCD(n){   n>0?beep(660,0.1,'sine',0.5):(beep(880,0.15,'sine',0.6),setTimeout(()=>beep(1100,0.2,'sine',0.7),160)); }
// ── Button click sounds ────────────────────────────────
function clickSound(heavy=false){
  try {
    const ctx = getACtx();
    const now = ctx.currentTime;
    // Noise burst for the "mechanical" texture
    const bufSize = ctx.sampleRate * 0.015;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0; i<bufSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    // Bandpass filter to shape the click tone
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = heavy ? 1800 : 3200;
    filter.Q.value = heavy ? 1.2 : 0.8;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(heavy ? 0.35 : 0.22, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + (heavy ? 0.045 : 0.028));
    // Mono routing
    const merger = ctx.createChannelMerger(2);
    const splitter = ctx.createChannelSplitter(1);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(splitter);
    splitter.connect(merger, 0, 0);
    splitter.connect(merger, 0, 1);
    merger.connect(ctx.destination);
    noise.start(now);
    noise.stop(now + 0.05);
  } catch(e){}
}
// Attach click sounds to all buttons
function initClickSounds(){
  // Heavy click for main action buttons
  ['btn-start','btn-stop','btn-reset','picker-confirm','picker-cancel'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('pointerdown', () => clickSound(true));
  });
  // Light click for all spin/picker/mode buttons
  document.querySelectorAll('.spin-btn, .mode-btn, .submode-pill, .picker-btn').forEach(el => {
    el.addEventListener('pointerdown', () => clickSound(false));
  });
}
function playCrowdCheer(){
  playAudio(CROWD_SRC, 0.8);
}
const MODE_INFO = {
  amrap:    {title:'AMRAP',    hasRest:false, hasRounds:false},
  fortime:  {title:'FOR TIME', hasRest:false, hasRounds:false},
  emom:     {title:'EMOM',     hasRest:false, hasRounds:true },
  tabata:   {title:'TABATA',   hasRest:true,  hasRounds:true },
  interval: {title:'INTERVAL', hasRest:true,  hasRounds:true },
  ladder:   {title:'LADDER',   hasRest:true,  hasRounds:true },
  stopwatch:{title:'STOPWATCH',hasRest:false, hasRounds:false},
};
function selectMode(mode){
  if(state.running) stopTimer();
  state.mode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  document.getElementById('mode-title').textContent=MODE_INFO[mode].title;
  document.getElementById('sg-resttime').classList.toggle('visible',MODE_INFO[mode].hasRest);
  document.getElementById('sg-rounds').style.display=MODE_INFO[mode].hasRounds?'block':'none';
  document.getElementById('sg-ladder').style.display=mode==='ladder'?'block':'none';
  applyDefaults(mode); syncSettings(); resetTimer();
}
function applyDefaults(m){
  const wm=document.getElementById('work-min'),ws=document.getElementById('work-sec');
  const rm=document.getElementById('rest-min'),rs=document.getElementById('rest-sec');
  const rd=document.getElementById('rounds-input');
  // Always reset all fields first to avoid bleed-through from previous mode
  wm.value=0;ws.value=0;rm.value=0;rs.value=0;rd.value=8;
  if(m==='amrap')    {wm.value=20;ws.value=0;}
  else if(m==='fortime')  {wm.value=20;ws.value=0;}
  else if(m==='emom')     {wm.value=1;ws.value=0;rd.value=10;}
  else if(m==='tabata')   {wm.value=0;ws.value=40;rm.value=0;rs.value=20;rd.value=8;}
  else if(m==='interval') {wm.value=0;ws.value=30;rm.value=0;rs.value=15;rd.value=8;}
  else if(m==='ladder')   {wm.value=0;ws.value=45;rm.value=0;rs.value=15;rd.value=10;}
  else if(m==='stopwatch'){wm.value=0;ws.value=0;}
  else if(m==='death_by') {wm.value=1;ws.value=0;rd.value=20;}
}
function syncSettings(){
  state.workTime=parseInt(document.getElementById('work-min').value||0)*60+parseInt(document.getElementById('work-sec').value||0);
  state.restTime=parseInt(document.getElementById('rest-min').value||0)*60+parseInt(document.getElementById('rest-sec').value||0);
  state.rounds=parseInt(document.getElementById('rounds-input').value||1);
  if(state.workTime<1&&state.mode!=='stopwatch'&&state.mode!=='fortime'&&state.mode!=='interval') state.workTime=60;
  updateDisplay();
}
function adjustTime(type,delta){
  const mId=type==='work'?'work-min':'rest-min', sId=type==='work'?'work-sec':'rest-sec';
  let total=parseInt(document.getElementById(mId).value||0)*60+parseInt(document.getElementById(sId).value||0);
  // Snap to nearest 10s boundary before adding delta
  if(Math.abs(delta)===10) total=Math.round(total/10)*10;
  total=Math.max(0,total+delta);
  const mins=Math.floor(total/60);
  const secs=total%60;
  document.getElementById(mId).value=mins;
  // Snap seconds to multiple of 10 (cap at 50 so it wraps cleanly)
  document.getElementById(sId).value=Math.min(50,Math.round(secs/10)*10);
  syncSettings();
}
function adjustNum(d){ const el=document.getElementById('rounds-input'); el.value=Math.max(1,Math.min(99,parseInt(el.value)+d)); syncSettings(); }
function setPill(el,type,val){
  el.parentElement.querySelectorAll('.submode-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  if(type==='countdown') state.countdownSecs=val;
  else if(type==='ladder') state.ladderType=val;
}
// Timer
function toggleStartPause(){
  if(!state.running&&!state.paused) startTimer();
  else if(state.running) pauseTimer();
  else resumeTimer();
}
function startTimer(){
  syncSettings();
  runCountdown(5,beginWorkout);
}
function runCountdown(n,cb){
  const ov=document.getElementById('countdown-overlay'),numEl=document.getElementById('countdown-num');
  ov.classList.add('show');
  numEl.textContent=n;
  beepCountdownTick();
  let cnt=n;
  const id=setInterval(()=>{
    cnt--;
    if(cnt<=0){
      numEl.textContent='GO!';
      numEl.style.color='var(--green)';
      beepCountdownGo();
      clearInterval(id);
      setTimeout(()=>{
        ov.classList.remove('show');
        numEl.style.color='var(--accent)';
        cb();
      },650);
    } else {
      // Re-trigger animation
      numEl.style.animation='none';
      numEl.offsetHeight; // reflow
      numEl.style.animation='popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275)';
      numEl.textContent=cnt;
      // Flash red on each tick
      numEl.style.color='#fff';
      ov.classList.add('flash');
      setTimeout(()=>{
        numEl.style.color='var(--accent)';
        ov.classList.remove('flash');
      },150);
      beepCountdownTick();
    }
  },1000);
}
function beepCountdownTick(){
  // Sharp descending click — like a metronome
  beep(880,0.06,'sine',0.5);
  setTimeout(()=>beep(660,0.04,'sine',0.3),60);
}
function beepCountdownGo(){
  // Ascending triple blast for GO
  beep(660,0.12,'square',0.6);
  setTimeout(()=>beep(880,0.12,'square',0.6),130);
  setTimeout(()=>beep(1100,0.25,'square',0.7),260);
}
function buildCoachTriggers(duration){
  // Scale number of clips based on workout length
  // Under 30s: none
  // 30s-2min: 1 clip at 50%
  // 2-5min: 2 clips at 33%, 66%
  // 5min+: 3 clips at 25%, 50%, 75%
  if(duration < 30) return [];
  // Reserve last 15% for final push clip
  const usable = Math.floor(duration * 0.82);
  let positions = [];
  if(duration < 120){
    positions = [0.50];
  } else if(duration < 300){
    positions = [0.33, 0.66];
  } else {
    positions = [0.25, 0.50, 0.75];
  }
  return positions
    .map(p => Math.floor(usable * p))
    .filter(t => t > 5); // safety: never fire in first 5s
}
function beginWorkout(){
  state.running=true;state.paused=false;state.elapsed=0;
  state.currentRound=1;state.alerted={last3:false};state.lastRoundPlayed=false;
  state.crowdCheerPlayed=false;
  // Ensure AudioContext is running — critical for MP3 playback mid-workout
  getACtx().resume().catch(()=>{});
  setupMode();updateBtn();enterFocusMode();
  // Build random coach cue times now that totalDuration is set
  state.coachTriggers = (state.totalDuration > 0 && state.totalDuration !== Infinity) ? buildCoachTriggers(state.totalDuration) : [];
  tick(); state.intervalId=setInterval(tick,1000);
}
function setupMode(){
  const m=state.mode;
  if(m==='amrap'){state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=0;}
  else if(m==='fortime'){
    // If work time is set, use it as a time cap (count down). Otherwise count up infinitely.
    if(state.workTime>0){
      state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=0;
    } else {
      state.phase='work';state.phaseTime=Infinity;state.totalDuration=1;state.totalRounds=0;
    }
  }
  else if(m==='stopwatch'){state.phase='work';state.phaseTime=Infinity;state.totalDuration=1;state.totalRounds=0;}
  else if(m==='emom'){state.phase='work';state.phaseTime=60;state.totalDuration=60;state.totalRounds=state.rounds;}
  else if(m==='tabata'||m==='interval'){state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=state.rounds;}
  else if(m==='ladder'){buildLadder();state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=state.ladderReps.length;state.ladderIdx=0;}
  else if(m==='death_by'){state.phase='work';state.phaseTime=60;state.totalDuration=60;state.totalRounds=state.rounds;}
}
function buildLadder(){
  const n=state.rounds;
  if(state.ladderType==='up') state.ladderReps=Array.from({length:n},(_,i)=>i+1);
  else if(state.ladderType==='down') state.ladderReps=Array.from({length:n},(_,i)=>n-i);
  else{state.ladderReps=[...Array.from({length:n},(_,i)=>i+1),...Array.from({length:n-1},(_,i)=>n-1-i)];state.totalRounds=state.ladderReps.length;}
}
function buildCoachTriggers(duration){
  if(duration <= 0) return [];
  const usable = Math.floor(duration * 0.82); // stay clear of final push + end sounds
  const start  = Math.max(5, Math.floor(duration * 0.12));
  const range  = usable - start;
  if(range < 10) return []; // too short to bother (under ~12s)
  // Scale clips by duration:
  // < 30s:   0 clips (handled by range < 10 guard above for very short)
  // 30-90s:  1 clip at midpoint
  // 90-300s: 2 evenly spaced clips
  // 300s+:   3 evenly spaced clips
  let positions = [];
  if(duration < 90){
    positions = [0.5]; // 1 clip at 50% of usable range
  } else if(duration < 300){
    positions = [0.33, 0.66]; // 2 clips
  } else {
    positions = [0.25, 0.50, 0.75]; // 3 clips
  }
  return positions
    .map(p => Math.round(start + range * p))
    .filter(t => t > 5 && t < usable);
}
function checkCoachAudio(){
  if(!state.running || state.phase!=='work' || state.phaseTime===Infinity) return;
  const phaseElapsed = state.totalDuration - state.phaseTime;
  // Coach motivational clips
  if(state.coachTriggers && state.coachTriggers.length > 0 && phaseElapsed >= state.coachTriggers[0]){
    state.coachTriggers.shift();
    playCoach();
  }
  // Final push clip at 82% through phase
  if(!state.lastRoundPlayed && state.totalDuration > 45 && state.phaseTime > 20){
    const finalPushAt = Math.floor(state.totalDuration * 0.82);
    if(phaseElapsed >= finalPushAt){
      playLastRound();
      state.lastRoundPlayed = true;
    }
  }
}
function tick(){
  if(!state.running)return;
  state.elapsed++;
  if(state.phaseTime!==Infinity)state.phaseTime--;
  checkAlerts();
  checkCoachAudio();
  if(state.phaseTime<=0){
    // Stop interval immediately to prevent double-fire
    clearInterval(state.intervalId);
    state.running=false;
    state.phaseTime=0;
    updateDisplay(); // show 00:00
    setTimeout(handlePhaseEnd, 300);
    return;
  }
  updateDisplay();
}
function checkAlerts(){
  const t=state.phaseTime;
  // Play crowd cheer 7 seconds before end (not in Tabata — intervals too short)
  if(t===7 && !state.crowdCheerPlayed && state.phase==='work' && state.totalDuration > 15 && state.mode !== 'tabata'){
    playCrowdCheer();
    state.crowdCheerPlayed = true;
  }
  // Countdown beep + flash from 5 down to 1, pitch rises each second
  const pitches={5:440, 4:523, 3:622, 2:740, 1:880};
  if(pitches[t]!==undefined){
    beepCountdownTick(pitches[t]);
    flashTimer();
  }
}
function flashTimer(){
  const el=document.getElementById('main-time');
  el.style.opacity='0.1';
  setTimeout(()=>el.style.opacity='1', 180);
}
function handlePhaseEnd(){
  const m=state.mode;
  beepEnd();
  if(m==='amrap'){finishWorkout("TIME'S UP");return;}
  if(m==='fortime'||m==='stopwatch'){finishWorkout('DONE');return;}
  if(m==='emom'){
    if(state.currentRound>=state.rounds){finishWorkout('DONE');return;}
    state.currentRound++;state.alerted={last3:false};
    state.crowdCheerPlayed=false;
    state.lastRoundPlayed=false;
    state.phaseTime=60;state.totalDuration=60;
    state.coachTriggers=buildCoachTriggers(60);
    state.running=true;
    getACtx().resume().catch(()=>{});
    state.intervalId=setInterval(tick,1000);
    beepStart();updateDisplay();return;
  }
  if(m==='tabata'||m==='interval'){
    if(state.phase==='work'&&state.restTime>0){
      state.phase='rest';state.phaseTime=state.restTime;state.totalDuration=state.restTime;
      state.alerted={last3:false};
      state.running=true;
      state.intervalId=setInterval(tick,1000);
      beepAlert();
    }else{advanceRound();}
    updateDisplay();return;
  }
  if(m==='ladder'){
    if(state.phase==='work'&&state.restTime>0){
      state.phase='rest';state.phaseTime=state.restTime;state.totalDuration=state.restTime;
      state.alerted={last3:false};
      state.running=true;
      state.intervalId=setInterval(tick,1000);
      beepAlert();
    }else{advanceLadder();}
    updateDisplay();return;
  }
}
function advanceRound(){
  if(state.currentRound>=state.rounds){finishWorkout('DONE');return;}
  state.currentRound++;state.phase='work';
  state.phaseTime=state.workTime;state.totalDuration=state.workTime;
  state.alerted={last3:false};
  state.crowdCheerPlayed=false;
  state.lastRoundPlayed=false;
  state.coachTriggers=buildCoachTriggers(state.workTime);
  state.running=true;
  getACtx().resume().catch(()=>{});
  state.intervalId=setInterval(tick,1000);
  beepStart();
}
function advanceLadder(){
  state.ladderIdx++;
  if(state.ladderIdx>=state.ladderReps.length){finishWorkout('DONE');return;}
  state.currentRound++;state.phase='work';
  state.phaseTime=state.workTime;state.totalDuration=state.workTime;
  state.alerted={last3:false};
  state.crowdCheerPlayed=false;
  state.lastRoundPlayed=false;
  state.coachTriggers=buildCoachTriggers(state.workTime);
  state.running=true;
  getACtx().resume().catch(()=>{});
  state.intervalId=setInterval(tick,1000);
  beepStart();
}
function finishWorkout(msg){
  clearInterval(state.intervalId);
  state.running=false;state.paused=false;state.phase='done';
  document.getElementById('phase-display').textContent=msg;
  document.getElementById('main-time').className='danger';
  updateBtn();
  playCrowdCheer();
  beep(880,0.2,'square',0.7);
  setTimeout(()=>beep(740,0.2,'square',0.7),200);
  setTimeout(()=>beep(587,0.2,'square',0.7),400);
  setTimeout(()=>beep(440,0.5,'square',0.8),600);
  setTimeout(()=>showFinishScreen(), 800);
}

  updateBtn();updateDisplay();
}

  stopTimer();state.elapsed=0;state.currentRound=1;state.phase='idle';

  state.lastRoundPlayed=false;

function updateDisplay(){
  const m=state.mode;
  const timeEl=document.getElementById('main-time');
  const phaseEl=document.getElementById('phase-display');
  const roundEl=document.getElementById('round-display');
  const progressEl=document.getElementById('progress-bar');
  const elapsedEl=document.getElementById('chip-elapsed');
  const roundsEl=document.getElementById('chip-rounds');
  elapsedEl.textContent=formatTime(state.elapsed);
  // Main time
  function setTime(secs){
    const t=formatTime(secs);
    document.getElementById('time-mm').textContent=t.slice(0,2);
    document.getElementById('time-ss').textContent=t.slice(3,5);
  }
  if(m==='stopwatch'){
    setTime(state.elapsed);
  }else if(m==='fortime'&&state.phase==='work'){
    setTime(state.phaseTime===Infinity?state.elapsed:state.phaseTime);
  }else if(state.phase==='idle'){
    setTime(state.workTime);
  }else if(state.phase==='done'){
    setTime(state.elapsed);
  }else{
    setTime(state.phaseTime===Infinity?state.elapsed:state.phaseTime);
  }
  // Phase label
  if(state.phase==='idle')       phaseEl.textContent='READY';
  else if(state.phase==='done')  phaseEl.textContent='';
  else if(state.phase==='rest')  phaseEl.textContent='REST';
  else if(m==='emom')            phaseEl.textContent='GO!';
  else if(m==='death_by')        phaseEl.textContent=`DO ${state.currentRound} REPS`;
  else                           phaseEl.textContent='WORK';
  // Color
  if(state.phase==='rest'){
    timeEl.className = state.phaseTime <= 5 ? 'rest' : 'rest';
  } else if(state.phase==='work'&&state.phaseTime!==Infinity){
    if(state.phaseTime<=5)       timeEl.className='danger';
    else if(state.phaseTime<=15) timeEl.className='warning';
    else                         timeEl.className='';
  } else {
    timeEl.className='';
  }
  // Round line
  if(m==='ladder'&&state.ladderReps.length>0&&state.ladderIdx<state.ladderReps.length){
    roundEl.textContent=`REPS: ${state.ladderReps[state.ladderIdx]}  [${state.currentRound}/${state.totalRounds}]`;
  }else if(state.totalRounds>0){
    roundEl.textContent=`ROUND  ${state.currentRound} / ${state.totalRounds}`;
  }else if(m==='amrap'&&state.phase==='work'){
    // Only show TAP TO COUNT on round 1, after that just show the round number
    roundEl.textContent = state.currentRound === 1
      ? `ROUND  ${state.currentRound}  · TAP TO COUNT`
      : `ROUND  ${state.currentRound}`;
  }else if(m==='amrap'&&state.phase==='idle'){
    roundEl.textContent='TAP TIMER TO COUNT ROUNDS';
  }else{
    roundEl.textContent='';
  }
  // Rounds chip
  roundsEl.textContent=(state.totalRounds>0||m==='amrap')&&state.phase!=='idle' ? state.currentRound : '—';
  // Progress bar
  if(state.totalDuration>0&&state.phaseTime!==Infinity){
    const pct=Math.max(0,Math.min(100,(1-state.phaseTime/state.totalDuration)*100));
    progressEl.style.width=pct+'%';

  }
}
function updateBtn(){

}
// ── Coach Audio ────────────────────────────────────────
// Audio consts moved to top of script — see below
// Preload external audio files
// Audio pool — pre-create real Audio objects (no cloneNode, works on mobile Safari)
// Each clip gets its own Audio object, reused by resetting currentTime
// MP3s loaded as AudioBuffers and played through the AudioContext
// This keeps everything in one audio session → no Spotify interruption on iOS
const BUFFER_CACHE = new Map(); // src -> AudioBuffer (loaded)
const BUFFER_LOADING = new Map(); // src -> Promise (in-flight)

function loadBuffer(src){
  if(BUFFER_CACHE.has(src)) return Promise.resolve(BUFFER_CACHE.get(src));
  if(BUFFER_LOADING.has(src)) return BUFFER_LOADING.get(src);
  const p = fetch(src)
    .then(r => r.arrayBuffer())
    .then(ab => getACtx().decodeAudioData(ab))
    .then(buf => { BUFFER_CACHE.set(src, buf); BUFFER_LOADING.delete(src); return buf; })
    .catch(e => { BUFFER_LOADING.delete(src); console.warn('Buffer load failed:', src, e); return null; });
  BUFFER_LOADING.set(src, p);
  return p;
}

function playAudio(src, volume=1.0){
  const ctx = getACtx();
  ctx.resume().then(()=>{
    loadBuffer(src).then(buf => {
      if(!buf) return;
      const source = ctx.createBufferSource();
      source.buffer = buf;
      const gain = ctx.createGain();
      gain.gain.value = volume;
      source.connect(gain);
      gain.connect(ctx.destination);
      source.start(0);
    });
  }).catch(()=>{});
}

// Preload — replaces old getPooledAudio().load() calls
function preloadBuffer(src){ loadBuffer(src); }
// Shuffled queue so clips never repeat until all played
let coachQueue = [];
function getNextClip() {
  if(coachQueue.length===0) {
    coachQueue = [...MOTIVATIONAL_CLIPS];
    for(let i=coachQueue.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [coachQueue[i],coachQueue[j]]=[coachQueue[j],coachQueue[i]];
    }
  }
  return coachQueue.pop();
}
function playCoach() {
  playAudio(getNextClip(), 1.0);
}
function playLastRound() {
  playAudio(LAST_ROUND_CLIP, 1.0);
}
function enterFocusMode(){ document.getElementById('app').classList.add('focus'); }
function exitFocusMode(){  document.getElementById('app').classList.remove('focus'); }
let _lastAmrapTap = 0, _amrapTapTimer = null;
document.getElementById('main-panel').addEventListener('click',(e)=>{
  const inFocus = document.getElementById('app').classList.contains('focus');
  if(e.target.closest('.ctrl-btn')) return;
  // FOR TIME + EMOM + TABATA: tap to pause, tap again to resume — never exit focus
  if((state.mode==='fortime' || state.mode==='emom' || state.mode==='tabata' || state.mode==='interval' || state.mode==='ladder' || state.mode==='stopwatch') && inFocus){
    if(state.running) pauseTimer();
    else if(state.paused) resumeTimer();
    return;
  }
  // AMRAP: single tap = count round, double tap = pause/resume
  if(state.mode==='amrap' && inFocus){
    const now = Date.now();
    const DOUBLE_TAP_MS = 300;
    if(now - _lastAmrapTap < DOUBLE_TAP_MS){
      // Double tap — pause or resume
      clearTimeout(_amrapTapTimer);
      _lastAmrapTap = 0;
      if(state.running) pauseTimer();
      else if(state.paused) resumeTimer();
    } else {
      // Potential single tap — wait to confirm it's not a double
      _lastAmrapTap = now;
      clearTimeout(_amrapTapTimer);
      _amrapTapTimer = setTimeout(()=>{
        if(state.running){
          state.currentRound++;
          beepStart();
          updateDisplay();
          const t = document.getElementById('main-time');
          t.style.opacity='0.4';
          setTimeout(()=>t.style.opacity='1', 120);
        }
      }, DOUBLE_TAP_MS);
    }
    return;
  }
  // All other modes: tap exits focus mode to show panels
  if(inFocus) exitFocusMode();
});
function formatTime(s){
  if(s===Infinity||s===undefined)return'00:00';
  s=Math.max(0,Math.round(s));
  return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function bindPickerEvents() {
  const minUp = document.getElementById('picker-min-up');
  const minDn = document.getElementById('picker-min-dn');
  const secUp = document.getElementById('picker-sec-up');
  const secDn = document.getElementById('picker-sec-dn');

  if(_pickerTarget === 'rounds') {
    minUp.addEventListener('click', () => { _pickerRounds = Math.min(99, _pickerRounds+1); document.getElementById('picker-min-val').textContent = _pickerRounds; });
    minDn.addEventListener('click', () => { _pickerRounds = Math.max(1, _pickerRounds-1); document.getElementById('picker-min-val').textContent = _pickerRounds; });
  } else {
    minUp.addEventListener('click', () => { _pickerMin = Math.min(99, _pickerMin+1); document.getElementById('picker-min-val').textContent = String(_pickerMin).padStart(2,'0'); });
    minDn.addEventListener('click', () => { _pickerMin = Math.max(0, _pickerMin-1); document.getElementById('picker-min-val').textContent = String(_pickerMin).padStart(2,'0'); });
    if(secUp) {
      secUp.addEventListener('click', () => { _pickerSec = (_pickerSec + 10) % 60; document.getElementById('picker-sec-val').textContent = String(_pickerSec).padStart(2,'0'); });
      secDn.addEventListener('click', () => { _pickerSec = (_pickerSec - 10 + 60) % 60; document.getElementById('picker-sec-val').textContent = String(_pickerSec).padStart(2,'0'); });
    }
  }
}

function addPickerTrigger(elId, type) {
  const el = document.getElementById(elId);
  if(!el) return;
  el.addEventListener('focus', (e) => {
    e.preventDefault();
    el.blur();
    openPicker(type);
  });
  el.addEventListener('click', (e) => {
    e.preventDefault();
    openPicker(type);
  });
}

let _fwAnim = null;
function startFireworks(){
  const canvas = document.getElementById('fireworks-canvas');
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const particles = [];
  const colors = ['#ff3c00','#ffd100','#00ff87','#5b6ef5','#ff6ab0','#00cfff','#ff9500'];
  function spawnBurst(x, y){
    const count = 60 + Math.floor(Math.random()*40);
    for(let i=0;i<count;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = 2 + Math.random()*6;
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        alpha: 1,
        size: 3+Math.random()*4,
        color: colors[Math.floor(Math.random()*colors.length)],
        decay: 0.012+Math.random()*0.01,
        gravity: 0.08
      });
    }
  }
  // Initial bursts
  setTimeout(()=>spawnBurst(canvas.width*0.3, canvas.height*0.35), 0);
  setTimeout(()=>spawnBurst(canvas.width*0.7, canvas.height*0.25), 300);
  setTimeout(()=>spawnBurst(canvas.width*0.5, canvas.height*0.45), 600);
  setTimeout(()=>spawnBurst(canvas.width*0.2, canvas.height*0.55), 900);
  setTimeout(()=>spawnBurst(canvas.width*0.8, canvas.height*0.4),  1200);
  // Random ongoing bursts
  const burstInterval = setInterval(()=>{
    if(!document.getElementById('finish-overlay').classList.contains('show')){ clearInterval(burstInterval); return; }
    spawnBurst(canvas.width*(0.1+Math.random()*0.8), canvas.height*(0.1+Math.random()*0.6));
  }, 900);
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity;
      p.vx*=0.98; p.alpha-=p.decay;
      if(p.alpha<=0){ particles.splice(i,1); continue; }
      ctx.globalAlpha=p.alpha;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    _fwAnim=requestAnimationFrame(loop);
  }
  loop();
}
function stopFireworks(){
  if(_fwAnim){ cancelAnimationFrame(_fwAnim); _fwAnim=null; }
  const canvas=document.getElementById('fireworks-canvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}
// ── End Fireworks ───────────────────────────────────────────
// Unlock on very first interaction with the page — before user even hits START
document.addEventListener('touchstart', _unlockAudio, {once: true, passive: true});
document.addEventListener('mousedown', _unlockAudio, {once: true});

// Pause workout on orientation change so timer doesn't run while screen rotates
window.addEventListener('orientationchange', () => {
  if(state.running) pauseTimer();
});
screen.orientation && screen.orientation.addEventListener('change', () => {
  if(state.running) pauseTimer();
});
document.getElementById('btn-start').addEventListener('touchstart',()=>{
  if(!noSleepV){try{const v=document.createElement('video');v.setAttribute('loop','');v.setAttribute('playsinline','');v.setAttribute('muted','');v.style.display='none';document.body.appendChild(v);v.play().catch(()=>{});noSleepV=v;}catch(e){}}
},{passive:true});
</script>
