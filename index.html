<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>WOD TIMER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #ff3c00;
    --accent2: #ffd100;
    --green: #00ff87;
    --text: #f0f0f0;
    --muted: #555;
    --danger: #ff1744;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  @media (orientation: portrait) {
    body::before {
      content: "↺  ROTATE TO LANDSCAPE";
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: 0.2em;
      background: var(--bg); color: var(--accent);
      z-index: 9999;
    }
    #app { display: none; }
  }
  #app {
    display: grid;
    grid-template-columns: 190px 1fr 175px;
    grid-template-rows: 100vh;
    height: 100vh;
    width: 100vw;
  }
  #mode-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .panel-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .mode-btn {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    cursor: pointer;
    border: none;
    background: none;
    color: #777;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem;
    letter-spacing: 0.14em;
    text-align: left;
    width: 100%;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .mode-btn:active { background: var(--surface2); }
  .mode-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-left-color: var(--accent);
  }
  .mode-cat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    padding: 10px 16px 3px;
  }
  .divider { height: 1px; background: var(--border); margin: 4px 0; }
  #main-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px 14px;
    position: relative;
    overflow: hidden;
  }
  #main-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,60,0,0.04) 0%, transparent 65%);
    pointer-events: none;
  }
  #mode-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-align: center;
  }
  #clock-display {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #phase-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--green);
    text-transform: uppercase;
    height: 14px;
    margin-bottom: 2px;
  }
  #main-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 11vw, 7.5rem);
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1;
    display: block;
    transition: color 0.2s, font-size 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #main-time.warning { color: var(--accent2); }
  #main-time.danger  { color: var(--danger); animation: blink 0.5s infinite; }
  @keyframes blink { 50% { opacity: 0.35; } }
  #round-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-top: 5px;
    min-height: 18px;
  }
  #info-row {
    display: flex;
    gap: 32px;
    align-items: center;
    justify-content: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    width: 100%;
    max-width: 360px;
  }
  .info-chip { text-align: center; }
  .info-chip-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    color: var(--accent2);
    display: block;
    line-height: 1;
  }
  .info-chip-lbl {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 1px;
  }
  #progress-wrap {
    width: 100%;
    position: relative;
    height: 20px;
    display: flex;
    align-items: center;
    gap: 0;
  }
  #progress-track {
    flex: 1;
    height: 10px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    position: relative;
  }
  #progress-track::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent calc(10% - 1px),
      rgba(0,0,0,0.5) calc(10% - 1px),
      rgba(0,0,0,0.5) 10%
    );
    z-index: 2;
    pointer-events: none;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff3c00, #ff8800, #ffd100);
    width: 0%;
    transition: width 0.1s linear;
    border-radius: 2px;
    position: relative;
    box-shadow: 0 0 10px rgba(255,100,0,0.6), 0 0 20px rgba(255,60,0,0.3);
    animation: burnPulse 1.5s ease-in-out infinite;
  }
  @keyframes burnPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,100,0,0.5), 0 0 16px rgba(255,60,0,0.2); }
    50%       { box-shadow: 0 0 14px rgba(255,150,0,0.8), 0 0 28px rgba(255,60,0,0.4); }
  }
  #controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ctrl-btn {
    border: none;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.93); }
  #btn-start {
    background: var(--accent);
    color: #fff;
    font-size: 1.5rem;
    padding: 11px 34px;
    border-radius: 50px;
    min-width: 130px;
    box-shadow: 0 4px 22px rgba(255,60,0,0.4);
  }
  #btn-start:active { background: #ff5000; }
  #btn-start.paused { background: var(--green); color: #000; box-shadow: 0 4px 22px rgba(0,255,135,0.3); }
  #btn-stop {
    background: transparent;
    color: #777;
    font-size: 1.1rem;
    padding: 10px 20px;
    border-radius: 50px;
    border: 1.5px solid #333;
  }
  #btn-stop:active { border-color: var(--danger); color: var(--danger); }
  #btn-reset {
    background: transparent;
    color: #666;
    font-size: 1.1rem;
    padding: 10px 20px;
    border-radius: 50px;
    border: 1.5px solid #282828;
  }
  #btn-reset:active { color: var(--accent2); border-color: var(--accent2); }
  #settings-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 10px 8px;
    overflow-y: auto;
    gap: 7px;
  }
  .setting-group {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px;
    border: 1px solid var(--border);
  }
  .setting-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.22em;
    color: #aaa;
    margin-bottom: 7px;
    display: block;
  }
  .setting-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .num-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    text-align: center;
    width: 48px;
    padding: 5px 2px;
    border-radius: 6px;
  }
  .num-input:focus { outline: none; border-color: var(--accent); }
  .colon { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--muted); }
  .spin-btn {
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: #aaa;
    width: 26px; height: 26px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .spin-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .extra-setting { display: none; }
  .extra-setting.visible { display: block; }
  .submode-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .submode-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 4px 9px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .submode-pill.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,209,0,0.07); }
  #mode-panel, #settings-panel {
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1), padding 0.35s;
  }
  #app.focus {
    grid-template-columns: 0 1fr 0;
    transition: grid-template-columns 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #app.focus #mode-panel,
  #app.focus #settings-panel {
    width: 0; padding: 0; overflow: hidden; border: none;
  }
  #app.focus #main-time     { font-size: clamp(8rem, 27vw, 21rem) !important; }
  #app.focus #mode-title    { font-size: 1.3rem; letter-spacing: 0.45em; }
  #app.focus #round-display { font-size: 1.7rem; }
  #app.focus #phase-display { font-size: 1rem; }
  #app.focus .info-chip-val { font-size: 2.3rem; }
  #app.focus .info-chip-lbl { font-size: 0.7rem; }
  #app.focus #info-row      { gap: 56px; margin-top: 16px; padding-top: 16px; }
  #app.focus #controls      { gap: 16px; }
  #app.focus #btn-start     { font-size: 2rem; padding: 14px 46px; }
  #app.focus #btn-stop,
  #app.focus #btn-reset     { font-size: 1.5rem; padding: 13px 28px; }
  #app.focus #progress-wrap  { height: 28px; }
  #app.focus #progress-track { height: 14px; }
  #focus-hint {
    display: none;
    position: absolute; top: 8px; right: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.55rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.1);
    pointer-events: none;
  }
  #app.focus #focus-hint { display: block; }
  #countdown-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 10;
    align-items: center; justify-content: center; flex-direction: column;
    transition: background 0.1s;
  }
  #countdown-overlay.flash {
    background: rgba(180,0,0,0.25);
  }
  #countdown-overlay.show { display: flex; }
  #countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(7rem, 22vw, 16rem);
    color: var(--accent);
    animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    line-height: 1;
  }
  @keyframes popIn {
    0%   { transform: scale(2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pop { 0%{transform:scale(1.6);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  #countdown-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem; letter-spacing: 0.3em; color: var(--muted);
  }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  /* Mobile landscape fixes */
  @media (max-height: 500px) {
    #app {
      grid-template-columns: 140px 1fr 150px;
    }
    #main-panel {
      padding: 4px 12px 8px;
    }
    #main-time {
      font-size: clamp(2.5rem, 8vw, 5rem) !important;
    }
    #mode-title { font-size: 0.7rem; }
    #phase-display { font-size: 0.6rem; height: 10px; margin-bottom: 1px; }
    #round-display { font-size: 0.75rem; margin-top: 2px; }
    #info-row { gap: 16px; margin-top: 5px; padding-top: 5px; }
    .info-chip-val { font-size: 1.1rem; }
    .info-chip-lbl { font-size: 0.45rem; }
    #progress-wrap { height: 12px; }
    #progress-track { height: 6px; }
    #controls { gap: 6px; }
    #btn-start { font-size: 1rem; padding: 7px 20px; min-width: 90px; }
    #btn-stop, #btn-reset { font-size: 0.85rem; padding: 6px 12px; }
    .panel-label { padding: 6px 10px 5px; font-size: 0.5rem; }
    .mode-btn { padding: 7px 10px; font-size: 0.9rem; }
    .setting-group { padding: 6px 8px; }
    .setting-label { font-size: 0.6rem; margin-bottom: 4px; }
    #settings-panel { gap: 4px; padding: 6px 5px; }
    #app.focus #main-time { font-size: clamp(5rem, 20vw, 12rem) !important; }
    #app.focus #btn-start { font-size: 1.3rem; padding: 9px 28px; }
    #app.focus #btn-stop,
    #app.focus #btn-reset { font-size: 1rem; padding: 8px 16px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="mode-panel">
    <div class="panel-label">WOD TIMER</div>
    <button class="mode-btn active" data-mode="amrap"    onclick="selectMode('amrap')">AMRAP</button>
    <button class="mode-btn"        data-mode="fortime"  onclick="selectMode('fortime')">FOR TIME</button>
    <button class="mode-btn"        data-mode="emom"     onclick="selectMode('emom')">EMOM</button>
    <div class="divider"></div>
    <div class="mode-cat">Interval</div>
    <button class="mode-btn" data-mode="tabata"    onclick="selectMode('tabata')">TABATA</button>
    <button class="mode-btn" data-mode="interval"  onclick="selectMode('interval')">INTERVAL</button>
    <button class="mode-btn" data-mode="ladder"    onclick="selectMode('ladder')">LADDER</button>
    <div class="divider"></div>
    <div class="mode-cat">Other</div>
    <button class="mode-btn" data-mode="stopwatch" onclick="selectMode('stopwatch')">STOPWATCH</button>
  </div>
  <div id="main-panel">
    <div id="mode-title">AMRAP</div>
    <div id="clock-display">
      <span id="phase-display">READY</span>
      <span id="main-time">20:00</span>
      <div id="round-display"></div>
      <div id="info-row">
        <div class="info-chip">
          <span class="info-chip-val" id="chip-elapsed">00:00</span>
          <span class="info-chip-lbl">Elapsed</span>
        </div>
        <div class="info-chip">
          <span class="info-chip-val" id="chip-rounds">—</span>
          <span class="info-chip-lbl">Rounds</span>
        </div>
      </div>
    </div>
    <div id="progress-wrap">
      <div id="progress-track">
        <div id="progress-bar"></div>
      </div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-reset" onclick="resetTimer()">↺ RESET</button>
      <button class="ctrl-btn" id="btn-start" onclick="toggleStartPause()">▶ START</button>
      <button class="ctrl-btn" id="btn-stop"  onclick="stopTimer()">■ STOP</button>
    </div>
    <div id="focus-hint">TAP TO SHOW CONTROLS</div>
    <div id="countdown-overlay">
      <div id="countdown-num">3</div>
      <div id="countdown-label">GET READY</div>
    </div>
  </div>
  <div id="settings-panel">
    <div class="setting-group">
      <span class="setting-label">WORK TIME</span>
      <div class="setting-row">
        <button class="spin-btn" onclick="adjustTime('work',-60)">−</button>
        <input class="num-input" id="work-min" type="number" min="0" max="99" value="20" onchange="syncSettings()">
        <span class="colon">:</span>
        <input class="num-input" id="work-sec" type="number" min="0" max="50" step="10" value="0" onchange="syncSettings()">
        <button class="spin-btn" onclick="adjustTime('work',10)">+</button>
      </div>
    </div>
    <div class="setting-group extra-setting" id="sg-resttime">
      <span class="setting-label">REST TIME</span>
      <div class="setting-row">
        <button class="spin-btn" onclick="adjustTime('rest',-10)">−</button>
        <input class="num-input" id="rest-min" type="number" min="0" max="99" value="0"  onchange="syncSettings()">
        <span class="colon">:</span>
        <input class="num-input" id="rest-sec" type="number" min="0" max="50" step="10" value="10" onchange="syncSettings()">
        <button class="spin-btn" onclick="adjustTime('rest',10)">+</button>
      </div>
    </div>
    <div class="setting-group" id="sg-rounds">
      <span class="setting-label">ROUNDS</span>
      <div class="setting-row">
        <button class="spin-btn" onclick="adjustNum(-1)">−</button>
        <input class="num-input" id="rounds-input" type="number" min="1" max="99" value="8" onchange="syncSettings()">
        <button class="spin-btn" onclick="adjustNum(1)">+</button>
      </div>
    </div>
    <div class="setting-group" id="sg-ladder" style="display:none">
      <span class="setting-label">LADDER</span>
      <div class="submode-row">
        <span class="submode-pill active" onclick="setPill(this,'ladder','up')">UP</span>
        <span class="submode-pill"        onclick="setPill(this,'ladder','down')">DOWN</span>
        <span class="submode-pill"        onclick="setPill(this,'ladder','updown')">UP/DOWN</span>
      </div>
    </div>
  </div>
</div>
<script>
const state = {
  mode:'amrap', running:false, paused:false, intervalId:null,
  workTime:20*60, restTime:10, rounds:8, countdownSecs:5,
  currentRound:1, totalRounds:0, elapsed:0, phaseTime:0,
  phase:'idle',
  alerted:{last3:false},
  ladderType:'up', ladderReps:[], ladderIdx:0,
  totalDuration:0, log:[],
  crowdCheerPlayed: false,
  coachTriggers: []
};
// Audio
let AudioCtx;
function getACtx(){ if(!AudioCtx) AudioCtx=new(window.AudioContext||window.webkitAudioContext)(); return AudioCtx; }
function beep(freq=880, dur=0.12, type='square', vol=0.3){
  try{
    const ctx = getACtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    // Force mono: merge to single channel then split back to stereo
    const merger  = ctx.createChannelMerger(2);
    const splitter = ctx.createChannelSplitter(1);
    osc.connect(gain);
    gain.connect(splitter);
    splitter.connect(merger, 0, 0);
    splitter.connect(merger, 0, 1);
    merger.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e){}
}
// Punchy countdown tick — two-tone click with a sharp attack
function beepCountdownTick(pitch=880){
  try{
    const ctx = getACtx();
    const now = ctx.currentTime;
    // Primary tone
    const osc1 = ctx.createOscillator();
    const g1   = ctx.createGain();
    const merger = ctx.createChannelMerger(2);
    const split  = ctx.createChannelSplitter(1);
    osc1.connect(g1); g1.connect(split);
    split.connect(merger,0,0); split.connect(merger,0,1);
    merger.connect(ctx.destination);
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(pitch, now);
    g1.gain.setValueAtTime(0.8, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc1.start(now); osc1.stop(now + 0.08);
    // Click layer
    const osc2 = ctx.createOscillator();
    const g2   = ctx.createGain();
    const m2   = ctx.createChannelMerger(2);
    const s2   = ctx.createChannelSplitter(1);
    osc2.connect(g2); g2.connect(s2);
    s2.connect(m2,0,0); s2.connect(m2,0,1);
    m2.connect(ctx.destination);
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(pitch * 1.5, now);
    g2.gain.setValueAtTime(0.3, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc2.start(now); osc2.stop(now + 0.04);
  } catch(e){}
}
function beepStart(){ beep(660,0.15,'sine',0.6); setTimeout(()=>beep(880,0.2,'sine',0.7),160); }
function beepEnd(){   beep(330,0.3,'sawtooth',0.5); setTimeout(()=>beep(220,0.4,'sawtooth',0.6),300); }
function beepAlert(){ beep(440,0.08,'sine',0.5); setTimeout(()=>beep(440,0.08,'sine',0.5),120); }
function beepCD(n){   n>0?beep(660,0.1,'sine',0.5):(beep(880,0.15,'sine',0.6),setTimeout(()=>beep(1100,0.2,'sine',0.7),160)); }
function playCrowdCheer(){
  const audio = getAudio(CROWD_SRC);
  audio.volume = 0.8;
  audio.play().catch(()=>{});
}
const MODE_INFO = {
  amrap:    {title:'AMRAP',    hasRest:false, hasRounds:false},
  fortime:  {title:'FOR TIME', hasRest:false, hasRounds:false},
  emom:     {title:'EMOM',     hasRest:false, hasRounds:true },
  tabata:   {title:'TABATA',   hasRest:true,  hasRounds:true },
  interval: {title:'INTERVAL', hasRest:true,  hasRounds:true },
  ladder:   {title:'LADDER',   hasRest:true,  hasRounds:true },
  stopwatch:{title:'STOPWATCH',hasRest:false, hasRounds:false},
};
function selectMode(mode){
  if(state.running) stopTimer();
  state.mode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  document.getElementById('mode-title').textContent=MODE_INFO[mode].title;
  document.getElementById('sg-resttime').classList.toggle('visible',MODE_INFO[mode].hasRest);
  document.getElementById('sg-rounds').style.display=MODE_INFO[mode].hasRounds?'block':'none';
  document.getElementById('sg-ladder').style.display=mode==='ladder'?'block':'none';
  applyDefaults(mode); syncSettings(); resetTimer();
}
function applyDefaults(m){
  const wm=document.getElementById('work-min'),ws=document.getElementById('work-sec');
  const rm=document.getElementById('rest-min'),rs=document.getElementById('rest-sec');
  const rd=document.getElementById('rounds-input');
  if(m==='tabata')   {wm.value=0;ws.value=40;rm.value=0;rs.value=20;rd.value=8;}
  else if(m==='emom'){wm.value=1;ws.value=0;rd.value=10;}
  else if(m==='interval'){wm.value=0;ws.value=0;rm.value=0;rs.value=0;rd.value=0;}
  else if(m==='amrap'){wm.value=20;ws.value=0;}
  else if(m==='death_by'){wm.value=1;ws.value=0;rd.value=20;}
  else if(m==='ladder'){wm.value=0;ws.value=45;rm.value=0;rs.value=15;rd.value=10;}
}
function syncSettings(){
  state.workTime=parseInt(document.getElementById('work-min').value||0)*60+parseInt(document.getElementById('work-sec').value||0);
  state.restTime=parseInt(document.getElementById('rest-min').value||0)*60+parseInt(document.getElementById('rest-sec').value||0);
  state.rounds=parseInt(document.getElementById('rounds-input').value||1);
  if(state.workTime<1&&state.mode!=='stopwatch'&&state.mode!=='fortime'&&state.mode!=='interval') state.workTime=60;
  updateDisplay();
}
function adjustTime(type,delta){
  const mId=type==='work'?'work-min':'rest-min', sId=type==='work'?'work-sec':'rest-sec';
  let total=parseInt(document.getElementById(mId).value||0)*60+parseInt(document.getElementById(sId).value||0);
  // Snap to nearest 10s boundary before adding delta
  if(Math.abs(delta)===10) total=Math.round(total/10)*10;
  total=Math.max(0,total+delta);
  const mins=Math.floor(total/60);
  const secs=total%60;
  document.getElementById(mId).value=mins;
  // Snap seconds to multiple of 10 (cap at 50 so it wraps cleanly)
  document.getElementById(sId).value=Math.min(50,Math.round(secs/10)*10);
  syncSettings();
}
function adjustNum(d){ const el=document.getElementById('rounds-input'); el.value=Math.max(1,Math.min(99,parseInt(el.value)+d)); syncSettings(); }
function setPill(el,type,val){
  el.parentElement.querySelectorAll('.submode-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  if(type==='countdown') state.countdownSecs=val;
  else if(type==='ladder') state.ladderType=val;
}
// Timer
function toggleStartPause(){
  if(!state.running&&!state.paused) startTimer();
  else if(state.running) pauseTimer();
  else resumeTimer();
}
function startTimer(){
  syncSettings();
  runCountdown(5,beginWorkout);
}
function runCountdown(n,cb){
  const ov=document.getElementById('countdown-overlay'),numEl=document.getElementById('countdown-num');
  ov.classList.add('show');
  numEl.textContent=n;
  beepCountdownTick();
  let cnt=n;
  const id=setInterval(()=>{
    cnt--;
    if(cnt<=0){
      numEl.textContent='GO!';
      numEl.style.color='var(--green)';
      beepCountdownGo();
      clearInterval(id);
      setTimeout(()=>{
        ov.classList.remove('show');
        numEl.style.color='var(--accent)';
        cb();
      },650);
    } else {
      // Re-trigger animation
      numEl.style.animation='none';
      numEl.offsetHeight; // reflow
      numEl.style.animation='popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275)';
      numEl.textContent=cnt;
      // Flash red on each tick
      numEl.style.color='#fff';
      ov.classList.add('flash');
      setTimeout(()=>{
        numEl.style.color='var(--accent)';
        ov.classList.remove('flash');
      },150);
      beepCountdownTick();
    }
  },1000);
}
function beepCountdownTick(){
  // Sharp descending click — like a metronome
  beep(880,0.06,'sine',0.5);
  setTimeout(()=>beep(660,0.04,'sine',0.3),60);
}
function beepCountdownGo(){
  // Ascending triple blast for GO
  beep(660,0.12,'square',0.6);
  setTimeout(()=>beep(880,0.12,'square',0.6),130);
  setTimeout(()=>beep(1100,0.25,'square',0.7),260);
}
function buildCoachTriggers(duration){
  // Scale number of clips based on workout length
  // Under 30s: none
  // 30s-2min: 1 clip at 50%
  // 2-5min: 2 clips at 33%, 66%
  // 5min+: 3 clips at 25%, 50%, 75%
  if(duration < 30) return [];
  // Reserve last 15% for final push clip
  const usable = Math.floor(duration * 0.82);
  let positions = [];
  if(duration < 120){
    positions = [0.50];
  } else if(duration < 300){
    positions = [0.33, 0.66];
  } else {
    positions = [0.25, 0.50, 0.75];
  }
  return positions
    .map(p => Math.floor(usable * p))
    .filter(t => t > 5); // safety: never fire in first 5s
}
function beginWorkout(){
  state.running=true;state.paused=false;state.elapsed=0;
  state.currentRound=1;state.alerted={last3:false};state.lastRoundPlayed=false;
  state.crowdCheerPlayed=false;
  setupMode();updateBtn();enterFocusMode();
  // Build random coach cue times now that totalDuration is set
  state.coachTriggers = (state.totalDuration > 0 && state.totalDuration !== Infinity) ? buildCoachTriggers(state.totalDuration) : [];
  tick(); state.intervalId=setInterval(tick,1000);
}
function setupMode(){
  const m=state.mode;
  if(m==='amrap'){state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=0;}
  else if(m==='fortime'){
    // If work time is set, use it as a time cap (count down). Otherwise count up infinitely.
    if(state.workTime>0){
      state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=0;
    } else {
      state.phase='work';state.phaseTime=Infinity;state.totalDuration=1;state.totalRounds=0;
    }
  }
  else if(m==='stopwatch'){state.phase='work';state.phaseTime=Infinity;state.totalDuration=1;state.totalRounds=0;}
  else if(m==='emom'){state.phase='work';state.phaseTime=60;state.totalDuration=60;state.totalRounds=state.rounds;}
  else if(m==='tabata'||m==='interval'){state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=state.rounds;}
  else if(m==='ladder'){buildLadder();state.phase='work';state.phaseTime=state.workTime;state.totalDuration=state.workTime;state.totalRounds=state.ladderReps.length;state.ladderIdx=0;}
  else if(m==='death_by'){state.phase='work';state.phaseTime=60;state.totalDuration=60;state.totalRounds=state.rounds;}
}
function buildLadder(){
  const n=state.rounds;
  if(state.ladderType==='up') state.ladderReps=Array.from({length:n},(_,i)=>i+1);
  else if(state.ladderType==='down') state.ladderReps=Array.from({length:n},(_,i)=>n-i);
  else{state.ladderReps=[...Array.from({length:n},(_,i)=>i+1),...Array.from({length:n-1},(_,i)=>n-1-i)];state.totalRounds=state.ladderReps.length;}
}
function buildCoachTriggers(duration){
  // Skip first 15% and last 15%, spread randomly with min 20% gap between clips
  if(duration<=0) return [];
  const start = Math.floor(duration * 0.15);
  const end   = Math.floor(duration * 0.85);
  const range = end - start;
  if(range < 20) return []; // too short to bother
  // Number of clips: 1 per ~60s of usable range, min 1, max 4
  const count = Math.min(4, Math.max(1, Math.floor(range / 60)));
  const minGap = Math.floor(range * 0.20);
  const triggers = [];
  let attempts = 0;
  while(triggers.length < count && attempts < 200){
    attempts++;
    const t = start + Math.floor(Math.random() * range);
    if(triggers.every(existing => Math.abs(existing - t) >= minGap)){
      triggers.push(t);
    }
  }
  return triggers.sort((a,b) => a - b);
}
function tick(){
  if(!state.running)return;
  state.elapsed++;
  if(state.phaseTime!==Infinity)state.phaseTime--;
  checkAlerts();
  if(state.phaseTime<=0){
    // Stop interval immediately to prevent double-fire
    clearInterval(state.intervalId);
    state.running=false;
    state.phaseTime=0;
    updateDisplay(); // show 00:00
    setTimeout(handlePhaseEnd, 300);
    return;
  }
  updateDisplay();
}
function checkAlerts(){
  const t=state.phaseTime;
  // Play crowd cheer 7 seconds before end (only if workout is long enough that 7s mark is meaningful)
  if(t===7 && !state.crowdCheerPlayed && state.phase==='work' && state.totalDuration > 15){
    playCrowdCheer();
    state.crowdCheerPlayed = true;
  }
  // Countdown beep + flash from 5 down to 1, pitch rises each second
  const pitches={5:440, 4:523, 3:622, 2:740, 1:880};
  if(pitches[t]!==undefined){
    beepCountdownTick(pitches[t]);
    flashTimer();
  }
}
function flashTimer(){
  const el=document.getElementById('main-time');
  el.style.opacity='0.1';
  setTimeout(()=>el.style.opacity='1', 180);
}
function handlePhaseEnd(){
  const m=state.mode;
  beepEnd();
  if(m==='amrap'){finishWorkout("TIME'S UP");return;}
  if(m==='fortime'||m==='stopwatch'){finishWorkout('DONE');return;}
  if(m==='emom'){
    if(state.currentRound>=state.rounds){finishWorkout('DONE');return;}
    state.currentRound++;state.alerted={last3:false};
    state.crowdCheerPlayed=false;
    state.phaseTime=60;state.totalDuration=60;
    state.running=true;
    state.intervalId=setInterval(tick,1000);
    beepStart();updateDisplay();return;
  }
  if(m==='tabata'||m==='interval'){
    if(state.phase==='work'&&state.restTime>0){
      state.phase='rest';state.phaseTime=state.restTime;state.totalDuration=state.restTime;
      state.alerted={last3:false};
      state.running=true;
      state.intervalId=setInterval(tick,1000);
      beepAlert();
    }else{advanceRound();}
    updateDisplay();return;
  }
  if(m==='ladder'){
    if(state.phase==='work'&&state.restTime>0){
      state.phase='rest';state.phaseTime=state.restTime;state.totalDuration=state.restTime;
      state.alerted={last3:false};
      state.running=true;
      state.intervalId=setInterval(tick,1000);
      beepAlert();
    }else{advanceLadder();}
    updateDisplay();return;
  }
}
function advanceRound(){
  if(state.currentRound>=state.rounds){finishWorkout('DONE');return;}
  state.currentRound++;state.phase='work';
  state.phaseTime=state.workTime;state.totalDuration=state.workTime;
  state.alerted={last3:false};
  state.crowdCheerPlayed=false;
  state.running=true;
  state.intervalId=setInterval(tick,1000);
  beepStart();
}
function advanceLadder(){
  state.ladderIdx++;
  if(state.ladderIdx>=state.ladderReps.length){finishWorkout('DONE');return;}
  state.currentRound++;state.phase='work';
  state.phaseTime=state.workTime;state.totalDuration=state.workTime;
  state.alerted={last3:false};
  state.crowdCheerPlayed=false;
  state.running=true;
  state.intervalId=setInterval(tick,1000);
  beepStart();
}
function finishWorkout(msg){
  clearInterval(state.intervalId);
  state.running=false;state.paused=false;state.phase='done';
  document.getElementById('phase-display').textContent=msg;
  document.getElementById('main-time').className='danger';
  updateBtn();
  // Play crowd cheer for For Time and Stopwatch completions
  if(state.mode==='fortime' || state.mode==='stopwatch'){
    playCrowdCheer();
  }
  // Epic finish sound — 4 descending booms
  beep(880,0.2,'square',0.7);
  setTimeout(()=>beep(740,0.2,'square',0.7),200);
  setTimeout(()=>beep(587,0.2,'square',0.7),400);
  setTimeout(()=>beep(440,0.5,'square',0.8),600);
  // Slide panels back after finish fanfare
  setTimeout(()=>exitFocusMode(), 1500);
}
function pauseTimer(){ clearInterval(state.intervalId);state.running=false;state.paused=true;updateBtn(); }
function resumeTimer(){ clearInterval(state.intervalId);state.running=true;state.paused=false;state.intervalId=setInterval(tick,1000);updateBtn(); }
function stopTimer(){
  clearInterval(state.intervalId);state.running=false;state.paused=false;state.phase='idle';
  exitFocusMode();
  updateBtn();updateDisplay();
}
function resetTimer(){
  stopTimer();state.elapsed=0;state.currentRound=1;state.phase='idle';
  state.alerted={last3:false};
  state.lastRoundPlayed=false;
  document.getElementById('main-time').className='';
  document.getElementById('progress-bar').style.width='0%';
  updateDisplay();
}
function updateDisplay(){
  const m=state.mode;
  const timeEl=document.getElementById('main-time');
  const phaseEl=document.getElementById('phase-display');
  const roundEl=document.getElementById('round-display');
  const progressEl=document.getElementById('progress-bar');
  const elapsedEl=document.getElementById('chip-elapsed');
  const roundsEl=document.getElementById('chip-rounds');
  elapsedEl.textContent=formatTime(state.elapsed);
  // Main time
  if(m==='stopwatch'||m==='fortime'){
    timeEl.textContent=formatTime(state.elapsed);
  }else if(state.phase==='idle'){
    timeEl.textContent=formatTime(state.workTime);
  }else if(state.phase==='done'){
    timeEl.textContent=formatTime(state.elapsed);
  }else{
    timeEl.textContent=formatTime(state.phaseTime===Infinity?state.elapsed:state.phaseTime);
  }
  // Phase label
  if(state.phase==='idle')       phaseEl.textContent='READY';
  else if(state.phase==='done')  phaseEl.textContent='';
  else if(state.phase==='rest')  phaseEl.textContent='REST';
  else if(m==='emom')            phaseEl.textContent='GO!';
  else if(m==='death_by')        phaseEl.textContent=`DO ${state.currentRound} REPS`;
  else                           phaseEl.textContent='WORK';
  // Color
  if(state.phase==='work'&&state.phaseTime!==Infinity){
    if(state.phaseTime<=5)       timeEl.className='danger';
    else if(state.phaseTime<=15) timeEl.className='warning';
    else                         timeEl.className='';
  }
  // Round line
  if(m==='ladder'&&state.ladderReps.length>0&&state.ladderIdx<state.ladderReps.length){
    roundEl.textContent=`REPS: ${state.ladderReps[state.ladderIdx]}  [${state.currentRound}/${state.totalRounds}]`;
  }else if(state.totalRounds>0){
    roundEl.textContent=`ROUND  ${state.currentRound} / ${state.totalRounds}`;
  }else if(m==='amrap'&&state.phase==='work'){
    roundEl.textContent=`ROUND  ${state.currentRound}  · TAP TO COUNT`;
  }else if(m==='amrap'&&state.phase==='idle'){
    roundEl.textContent='TAP TIMER TO COUNT ROUNDS';
  }else{
    roundEl.textContent='';
  }
  // Rounds chip
  roundsEl.textContent=(state.totalRounds>0||m==='amrap')&&state.phase!=='idle' ? state.currentRound : '—';
  // Progress bar
  if(state.totalDuration>0&&state.phaseTime!==Infinity){
    const pct=Math.max(0,Math.min(100,(1-state.phaseTime/state.totalDuration)*100));
    progressEl.style.width=pct+'%';
    // Play coach clips at pre-generated random trigger points
    if(state.running && state.phase==='work' && state.coachTriggers && state.coachTriggers.length > 0 && state.elapsed >= state.coachTriggers[0]){
      state.coachTriggers.shift();
      playCoach();
    }
    // Play "final push" clip at ~82% through workout, only if 20s+ remain (avoids clash with end sounds)
    if(state.running && state.phase==='work' && !state.lastRoundPlayed && state.totalDuration>45 && state.phaseTime>20){
      const finalPushAt = Math.floor(state.totalDuration * 0.82);
      if(state.elapsed >= finalPushAt){
        playLastRound();
        state.lastRoundPlayed=true;
      }
    }
  }
}
function updateBtn(){
  const btn=document.getElementById('btn-start');
  if(state.running){btn.textContent='⏸ PAUSE';btn.classList.remove('paused');}
  else if(state.paused){btn.textContent='▶ RESUME';btn.classList.add('paused');}
  else{btn.textContent='▶ START';btn.classList.remove('paused');}
  // Update focus hint
  const hint=document.getElementById('focus-hint');
  if(hint){
    if(state.mode==='fortime' || state.mode==='emom' || state.mode==='tabata' || state.mode==='interval' || state.mode==='ladder' || state.mode==='stopwatch') hint.textContent = state.running ? 'TAP TO PAUSE' : 'TAP TO RESUME';
    else if(state.mode==='amrap') hint.textContent = 'TAP TO COUNT ROUND';
    else hint.textContent = 'TAP TO SHOW CONTROLS';
  }
}

const BASE = 'https://cdn.jsdelivr.net/gh/skujic/wod-timer@main/audio/voiceovers/';
const CROWD_SRC = BASE + '11325622-crowd-clapping-and-cheering-effect-272056.mp3';
const COACH_CLIPS = [
  BASE + 'ElevenLabs_2026-03-07T21_41_06_Crossfit_gen_sp100_s50_sb75_v3.mp3',
  BASE + 'ElevenLabs_2026-03-07T21_41_28_Crossfit_gen_sp100_s50_sb75_v3.mp3',

];
const LAST_ROUND_CLIP = COACH_CLIPS[11];
const MOTIVATIONAL_CLIPS = COACH_CLIPS.slice(0, 11);
// Preload external audio files
const AUDIO_CACHE = new Map();
function getAudio(src){
  let audio = AUDIO_CACHE.get(src);
  if(!audio){
    audio = new Audio(src);
    audio.preload = 'auto';
    AUDIO_CACHE.set(src, audio);
  }
  return audio.cloneNode();
}
// Shuffled queue so clips never repeat until all played
let coachQueue = [];
function getNextClip() {
  if(coachQueue.length===0) {
    coachQueue = [...MOTIVATIONAL_CLIPS];
    // Fisher-Yates shuffle
    for(let i=coachQueue.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [coachQueue[i],coachQueue[j]]=[coachQueue[j],coachQueue[i]];
    }
  }
  return coachQueue.pop();
}
function playCoach() {
  const src = getNextClip();
  const audio = getAudio(src);
  audio.volume = 1.0;
  audio.play().catch(()=>{});
}
function playLastRound() {
  const audio = getAudio(LAST_ROUND_CLIP);
  audio.volume = 1.0;
  audio.play().catch(()=>{});
}
function enterFocusMode(){ document.getElementById('app').classList.add('focus'); }
function exitFocusMode(){  document.getElementById('app').classList.remove('focus'); }
document.getElementById('main-panel').addEventListener('click',(e)=>{
  const inFocus = document.getElementById('app').classList.contains('focus');
  if(e.target.closest('.ctrl-btn')) return;
  // FOR TIME + EMOM + TABATA: tap to pause, tap again to resume — never exit focus
  if((state.mode==='fortime' || state.mode==='emom' || state.mode==='tabata' || state.mode==='interval' || state.mode==='ladder' || state.mode==='stopwatch') && inFocus){
    if(state.running) pauseTimer();
    else if(state.paused) resumeTimer();
    return;
  }
  // AMRAP: tap to count a round
  if(state.mode==='amrap' && state.running && inFocus){
    state.currentRound++;
    beepStart();
    updateDisplay();
    const t = document.getElementById('main-time');
    t.style.opacity='0.4';
    setTimeout(()=>t.style.opacity='1', 120);
    return;
  }
  // All other modes: tap exits focus mode to show panels
  if(inFocus) exitFocusMode();
});
function formatTime(s){
  if(s===Infinity||s===undefined)return'00:00';
  s=Math.max(0,Math.round(s));
  return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
syncSettings();
updateDisplay();
// Apply correct panel visibility for default mode on load
document.getElementById('sg-rounds').style.display = MODE_INFO[state.mode].hasRounds ? 'block' : 'none';
document.getElementById('sg-resttime').classList.toggle('visible', MODE_INFO[state.mode].hasRest);
document.getElementById('sg-ladder').style.display = state.mode === 'ladder' ? 'block' : 'none';
let noSleepV;
let _audioUnlocked = false;
function _unlockAudio(){
  if(_audioUnlocked) return;
  _audioUnlocked = true;
  // Briefly play+pause all clips at zero volume to satisfy autoplay policy
  const allSrcs = [...COACH_CLIPS, CROWD_SRC];
  allSrcs.forEach(src => {
    const a = new Audio(src);
    a.volume = 0;
    a.play().then(() => a.pause()).catch(() => {});
  });
  getACtx().resume().catch(() => {});
}
document.getElementById('btn-start').addEventListener('click', _unlockAudio);
document.getElementById('btn-start').addEventListener('touchstart',()=>{
  _unlockAudio();
  if(!noSleepV){try{const v=document.createElement('video');v.setAttribute('loop','');v.setAttribute('playsinline','');v.setAttribute('muted','');v.style.display='none';document.body.appendChild(v);v.play().catch(()=>{});noSleepV=v;}catch(e){}}
},{passive:true});
